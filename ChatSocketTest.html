<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Realtime Chat Test</title>
  <style>
    body { font-family: Arial; background: #111; color: #0f0; padding: 20px; }
    .row { display: flex; gap: 20px; }
    .box { width: 48%; background: #000; padding: 10px; border: 1px solid rgb(93, 0, 255); }
    input, textarea, button { width: 100%; padding: 8px; margin-top: 6px; }
    button { cursor: pointer; background: #0f0; border: none; font-weight: bold; color:#000; }
    .chat, .log { height: 200px; overflow-y: auto; background: #000; padding: 6px; margin-top: 8px; border: 1px solid #0f0; font-size: 13px; }
  </style>
</head>
<body>

<h2>🔥 Realtime Chat</h2>
<div class="row">
  <!-- User A -->
  <div class="box">
    <h3>User A</h3>
    <input id="tokenA" placeholder="JWT Token (User A)">
    <input id="receiverA" placeholder="Receiver UserId">
    <textarea id="msgA" placeholder="Message"></textarea>
    <button onclick="connect('A')">Connect</button>
    <button onclick="send('A')">Send</button>
    <div class="chat" id="chatA"></div>
  </div>

  <!-- User B -->
  <div class="box">
    <h3>User B</h3>
    <input id="tokenB" placeholder="JWT Token (User B)">
    <input id="receiverB" placeholder="Receiver UserId">
    <textarea id="msgB" placeholder="Message"></textarea>
    <button onclick="connect('B')">Connect</button>
    <button onclick="send('B')">Send</button>
    <div class="chat" id="chatB"></div>
  </div>
</div>

<h3>🔍 Logs</h3>
<div class="log" id="log"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let socketA=null, socketB=null;
const logBox = document.getElementById("log");

function log(msg){ logBox.innerHTML+=`<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`; logBox.scrollTop = logBox.scrollHeight; }

function connect(user){
  const token = document.getElementById(user==='A'?'tokenA':'tokenB').value;
  if(!token){ log(`❌ User ${user} token missing`); return; }

  const socket = io("http://localhost", { query:{ token }, transports:["websocket"] });

  socket.on("connect", ()=>{ log(`✅ User ${user} connected | SocketId=${socket.id}`); });
  socket.on("connect_error", err=>{ log(`❌ User ${user} error: ${err.message}`); });
  socket.on("chatMessage", data=>{
    const box = user==='A'?'chatA':'chatB';
    document.getElementById(box).innerHTML+=`<div><b>${data.sender}:</b> ${data.message}</div>`;
  });

  if(user==='A') socketA=socket; else socketB=socket;
}

function send(user){
  const socket = user==='A'?socketA:socketB;
  if(!socket || !socket.connected){ log(`⚠️ User ${user} not connected`); return; }

  const msg = document.getElementById(user==='A'?'msgA':'msgB').value;
  const receiverId = document.getElementById(user==='A'?'receiverA':'receiverB').value;
  if(!msg||!receiverId){ log("❌ Message or receiver missing"); return; }

  socket.emit("chatMessage",{ receiverId, message: msg });
  log(`➡️ User ${user} sent message`);
  if(user==='A') document.getElementById("msgA").value=''; else document.getElementById("msgB").value='';
}
</script>
</body>
</html>
